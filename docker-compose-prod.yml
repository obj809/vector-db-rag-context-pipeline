# Production compose for the VPS (behind Cloudflare + Nginx Proxy Manager).
# Standalone — run this INSTEAD of docker-compose.yml (not layered with -f):
#   docker compose -f docker-compose-prod.yml up -d
#
# Run it from this repo's directory so the Compose project name stays
# `vector-db-rag-context-pipeline` and its default network keeps the name
# `vector-db-rag-context-pipeline_default` that the backend/indexer join.
#
# Differences from dev (docker-compose.yml):
#   - NO host port publish — Postgres is reachable only over the internal
#     vector-db + webnet networks (as db:5432), never on the VPS host interface.
#   - restart: unless-stopped (survive VPS reboots / daemon restarts).
#   - resource limits sized for the 2 vCPU / 7.9 GB VPS shared with NPM + LiteLLM.
# Prereq: docker network create webnet
services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag        # internal-only; the DB is never published to the host
      POSTGRES_DB: rag
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 5
    cpus: 1.0
    mem_limit: 1g
    mem_reservation: 256m
    networks:
      - default
      - webnet

volumes:
  pgdata:

networks:
  webnet:
    external: true
    name: webnet
